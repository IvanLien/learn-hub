<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日语旅行速成 · Japanese Travel</title>
  <style>
    :root {
      --primary: #e11d48;
      --primary-dark: #be123c;
      --slang: #8b5cf6;
      --accent: #f59e0b;
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-elevated: #334155;
      --text: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border: #334155;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --transition: 0.2s ease;
      --font: 'Segoe UI','PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.7; min-height: 100vh; }

    /* ── Nav ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,23,42,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--text); }
    .nav-logo { font-size: 1.8rem; }
    .nav-title {
      font-size: 1.15rem; font-weight: 700;
      background: linear-gradient(135deg, #e11d48, #f97316, #f59e0b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav-actions { display:flex; align-items:center; gap:10px; }
    .nav-back {
      color: var(--text-muted); text-decoration:none; font-size:0.88rem;
      padding: 6px 12px; border-radius:8px; transition: var(--transition);
    }
    .nav-back:hover { color:var(--text); background:var(--bg-elevated); }
    .lang-toggle {
      background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text); padding: 6px 16px; border-radius: 20px;
      font-size: 0.88rem; font-weight: 600; cursor: pointer;
      transition: var(--transition); font-family: var(--font);
    }
    .lang-toggle:hover { background: var(--primary); border-color: var(--primary); }

    /* ── Hero ── */
    .hero {
      padding: 2.5rem 2rem 1.8rem; text-align: center;
      background: linear-gradient(180deg, rgba(225,29,72,0.07) 0%, transparent 100%);
    }
    .hero-badge {
      display: inline-block;
      background: rgba(225,29,72,0.12); color: #fb7185;
      border: 1px solid rgba(225,29,72,0.28);
      padding: 4px 14px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem;
    }
    .hero h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem); font-weight: 800;
      letter-spacing: -0.03em; margin-bottom: 0.7rem; line-height: 1.2;
    }
    .hero h1 .jp {
      background: linear-gradient(135deg, #e11d48, #f97316, #f59e0b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero p { font-size: 0.97rem; color: var(--text-muted); max-width: 540px; margin: 0 auto 1.2rem; }
    .tts-notice {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.22);
      color: #34d399; padding: 5px 14px; border-radius: 20px;
      font-size: 0.8rem; font-weight: 600;
    }
    .tts-notice.unavail { background: rgba(100,116,139,0.1); border-color: rgba(100,116,139,0.22); color: #94a3b8; }

    /* ── Controls ── */
    .controls { max-width: 1100px; margin: 0 auto; padding: 1rem 1.5rem 0.5rem; }
    .search-row { display: flex; gap: 10px; margin-bottom: 1rem; }
    .search-box {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text); padding: 10px 16px; border-radius: 10px;
      font-size: 0.93rem; font-family: var(--font); outline: none; transition: var(--transition);
    }
    .search-box::placeholder { color: var(--text-muted); }
    .search-box:focus { border-color: var(--primary); }
    .drill-btn {
      background: linear-gradient(135deg, #8b5cf6, #6366f1); color: #fff;
      border: none; padding: 10px 20px; border-radius: 10px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer; font-family: var(--font);
      transition: var(--transition); white-space: nowrap;
    }
    .drill-btn:hover { opacity: 0.85; }
    .tabs-wrap { overflow-x: auto; scrollbar-width: none; }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .tabs { display: flex; gap: 8px; white-space: nowrap; padding-bottom: 8px; }
    .tab {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-muted); padding: 7px 15px; border-radius: 20px;
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      transition: var(--transition); font-family: var(--font);
    }
    .tab:hover { color: var(--text); border-color: var(--text-muted); }
    .tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .tab.fav-tab.active { background: var(--accent); border-color: var(--accent); }

    /* ── Phrase grid ── */
    .phrase-grid {
      max-width: 1100px; margin: 0 auto; padding: 1rem 1.5rem 3rem;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem;
    }
    .p-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.2rem;
      display: flex; flex-direction: column; gap: 0.55rem;
      transition: var(--transition); position: relative;
    }
    .p-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow); }
    .p-card.slang-card { border-color: rgba(139,92,246,0.25); }
    .p-card.slang-card:hover { border-color: var(--slang); }
    .p-card.essential-card { border-color: rgba(225,29,72,0.18); }

    .card-badges { display: flex; gap: 5px; flex-wrap: wrap; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em; }
    .badge-ess { background: rgba(225,29,72,0.13); color: #fb7185; }
    .badge-slang { background: rgba(139,92,246,0.13); color: #a78bfa; }
    .badge-casual { background: rgba(6,182,212,0.13); color: #22d3ee; }

    .jp-text { font-size: 1.55rem; font-weight: 700; color: var(--text); line-height: 1.3; letter-spacing: 0.01em; }
    .romaji { font-size: 0.85rem; color: #fb7185; font-weight: 600; letter-spacing: 0.03em; }
    .meanings { display: flex; flex-direction: column; gap: 3px; }
    .meaning-row { display: flex; align-items: flex-start; gap: 7px; font-size: 0.86rem; }
    .meaning-flag { flex-shrink: 0; margin-top: 2px; }
    .meaning-text { color: var(--text-secondary); }
    .tip-block {
      background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.18);
      border-radius: 8px; padding: 8px 10px;
      font-size: 0.78rem; color: #fbbf24; line-height: 1.55;
    }
    .tip-block::before { content: '💡 '; }

    .card-actions { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 0.4rem; }
    .speak-btn {
      background: rgba(225,29,72,0.08); border: 1px solid rgba(225,29,72,0.22);
      color: #fb7185; padding: 6px 13px; border-radius: 8px;
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      transition: var(--transition); font-family: var(--font);
    }
    .speak-btn:hover { background: rgba(225,29,72,0.18); }
    .speak-btn.speaking { background: rgba(225,29,72,0.28); }
    .fav-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1.25rem; padding: 4px; line-height: 1;
      transition: transform 0.15s; opacity: 0.4;
    }
    .fav-btn:hover { transform: scale(1.2); opacity: 1; }
    .fav-btn.on { opacity: 1; }

    .empty-state { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
    .empty-state .ei { font-size: 2.5rem; margin-bottom: 0.8rem; }

    /* ── Culture section ── */
    .culture-section { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 4rem; }
    .section-title { font-size: 1.05rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 1rem; }
    .culture-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 0.9rem; }
    .culture-card {
      background: var(--bg-card); border: 1px solid rgba(245,158,11,0.18);
      border-radius: 12px; padding: 1rem 1.1rem;
    }
    .culture-title { font-size: 0.88rem; font-weight: 700; color: #fbbf24; margin-bottom: 0.35rem; }
    .culture-body { font-size: 0.82rem; color: var(--text-muted); line-height: 1.6; }

    /* ── Drill overlay ── */
    .drill-overlay {
      position: fixed; inset: 0; z-index: 200; background: var(--bg);
      display: none; flex-direction: column; align-items: center; justify-content: center; padding: 2rem;
    }
    .drill-overlay.open { display: flex; }
    .drill-close {
      position: fixed; top: 1.2rem; right: 1.2rem;
      background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text-muted); padding: 7px 16px; border-radius: 10px;
      font-size: 0.88rem; cursor: pointer; font-family: var(--font);
    }
    .drill-close:hover { color: var(--text); }
    .drill-progress { width: 100%; max-width: 480px; height: 3px; background: var(--bg-elevated); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
    .drill-progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
    .drill-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 22px; padding: 2.5rem 2rem; max-width: 480px; width: 100%;
      text-align: center; cursor: pointer; min-height: 250px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.8rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5); transition: transform 0.15s;
    }
    .drill-card:hover { transform: scale(1.01); }
    .drill-hint { font-size: 0.8rem; color: var(--text-muted); }
    .drill-jp { font-size: 2.2rem; font-weight: 800; }
    .drill-romaji { font-size: 1rem; color: #fb7185; font-weight: 600; }
    .drill-meaning { font-size: 0.95rem; color: var(--text-secondary); margin-top: 0.2rem; }
    .drill-controls { display: flex; gap: 12px; margin-top: 1.4rem; flex-wrap: wrap; justify-content: center; }
    .drill-fail { background: #ef4444; border: none; color: #fff; padding: 11px 26px; border-radius: 11px; font-size: 0.93rem; font-weight: 700; cursor: pointer; font-family: var(--font); }
    .drill-ok   { background: #10b981; border: none; color: #fff; padding: 11px 26px; border-radius: 11px; font-size: 0.93rem; font-weight: 700; cursor: pointer; font-family: var(--font); }
    .drill-skip { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-muted); padding: 11px 18px; border-radius: 11px; font-size: 0.88rem; cursor: pointer; font-family: var(--font); }
    .drill-score { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.8rem; }

    /* ── Voice bar ── */
    .voice-bar {
      display: none; align-items: center; flex-wrap: wrap; gap: 10px;
      padding: 10px 14px; margin-bottom: 1rem;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    }
    .voice-bar.visible { display: flex; }
    .vb-section { display: flex; align-items: center; gap: 7px; }
    .vb-label { font-size: 0.78rem; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
    .vb-divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
    .voice-chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .voice-chip {
      background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text-muted); padding: 4px 11px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
      transition: var(--transition); font-family: var(--font);
    }
    .voice-chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .voice-chip:not(.active):hover { border-color: var(--primary); color: var(--text); }
    .speed-btns { display: flex; gap: 5px; }
    .speed-btn {
      background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text-muted); padding: 4px 11px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
      transition: var(--transition); font-family: var(--font);
    }
    .speed-btn.active { background: rgba(225,29,72,0.14); border-color: rgba(225,29,72,0.38); color: #fb7185; }
    .speed-btn:not(.active):hover { border-color: var(--text-muted); color: var(--text); }
    .vb-tip {
      width: 100%; font-size: 0.74rem; color: var(--text-muted);
      background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.18);
      border-radius: 6px; padding: 5px 10px; display: none;
    }
    .vb-tip.show { display: block; }
    .vb-tip a { color: #fbbf24; text-decoration: none; }
    .vb-tip a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .phrase-grid { grid-template-columns: 1fr; padding: 1rem; }
      .nav { padding: 0 1rem; }
      .jp-text { font-size: 1.35rem; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="../../index.html">
    <span class="nav-logo">🎌</span>
    <span class="nav-title" data-i18n="nav.title">日语旅行速成</span>
  </a>
  <div class="nav-actions">
    <a class="nav-back" href="../../index.html" data-i18n="nav.back">← 返回</a>
    <button class="lang-toggle" onclick="toggleLang()" data-i18n="nav.lang">English</button>
  </div>
</nav>

<section class="hero">
  <div class="hero-badge" data-i18n="hero.badge">旅行日语 · 速成宝典</div>
  <h1><span class="jp">日本へようこそ</span></h1>
  <p data-i18n="hero.desc">精选旅行必备日语，地道表达 + 流行俚语，每个短语可点击播放真实发音。</p>
  <div id="tts-status" class="tts-notice">⏳ 检测语音支持…</div>
</section>

<div class="controls">
  <div class="search-row">
    <input class="search-box" id="search" type="text" data-i18n-ph="search.ph" placeholder="搜索短语…">
    <button class="drill-btn" onclick="startDrill()" data-i18n="btn.drill">⚡ 闪卡练习</button>
  </div>
  <div class="tabs-wrap">
    <div class="tabs" id="tabs"></div>
  </div>
  <!-- Voice & speed bar — populated after voices load -->
  <div class="voice-bar" id="voice-bar">
    <div class="vb-section">
      <span class="vb-label" data-i18n="voice.label">🎤 声音</span>
      <div class="voice-chips" id="voice-chips"></div>
    </div>
    <div class="vb-divider"></div>
    <div class="vb-section">
      <span class="vb-label" data-i18n="speed.label">⏱ 速度</span>
      <div class="speed-btns">
        <button class="speed-btn" data-rate="0.60" onclick="setSpeed(this)" data-i18n="speed.slow">🐢 学习</button>
        <button class="speed-btn active" data-rate="0.84" onclick="setSpeed(this)" data-i18n="speed.normal">▶ 标准</button>
        <button class="speed-btn" data-rate="1.10" onclick="setSpeed(this)" data-i18n="speed.fast">⚡ 地道</button>
      </div>
    </div>
    <div class="vb-divider"></div>
    <div class="vb-section">
      <span class="vb-label" data-i18n="pitch.label">🎵 音调</span>
      <div class="speed-btns" id="pitch-btns">
        <button class="speed-btn" data-pitch="1.35" onclick="setPitch(this)" data-i18n="pitch.high">高音</button>
        <button class="speed-btn active" data-pitch="1.00" onclick="setPitch(this)" data-i18n="pitch.mid">中音</button>
        <button class="speed-btn" data-pitch="0.65" onclick="setPitch(this)" data-i18n="pitch.low">低音</button>
      </div>
    </div>
    <div class="vb-tip" id="vb-tip" data-i18n-html="voice.tip"></div>
  </div>
</div>

<div class="phrase-grid" id="phrase-grid"></div>

<section class="culture-section" id="culture-section">
  <div class="section-title" data-i18n="culture.title">🏯 文化小贴士</div>
  <div class="culture-grid" id="culture-grid"></div>
</section>

<!-- Drill overlay -->
<div class="drill-overlay" id="drill-overlay">
  <button class="drill-close" onclick="closeDrill()" data-i18n="btn.close">✕ 退出练习</button>
  <div class="drill-progress"><div class="drill-progress-fill" id="drill-bar"></div></div>
  <div class="drill-card" id="drill-card" onclick="flipDrill()">
    <div class="drill-hint" id="drill-hint" data-i18n="drill.tap">点击卡片翻转查看答案</div>
    <div class="drill-jp" id="drill-jp"></div>
    <div id="drill-back" style="display:none">
      <div class="drill-romaji" id="drill-romaji"></div>
      <div class="drill-meaning" id="drill-meaning"></div>
    </div>
  </div>
  <div class="drill-controls" id="drill-btns" style="display:none">
    <button class="drill-fail" onclick="drillAnswer(false)" data-i18n="drill.forgot">✗ 没记住</button>
    <button class="drill-skip" onclick="drillNext()" data-i18n="drill.skip">跳过</button>
    <button class="drill-ok"   onclick="drillAnswer(true)"  data-i18n="drill.knew">✓ 记住了</button>
  </div>
  <div class="drill-score" id="drill-score"></div>
</div>

let lang = localStorage.getItem('edu-lang') || 'zh';
const t = k => (T[lang] || T.zh)[k] || k;

function applyLang() {
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.querySelectorAll('[data-i18n]').forEach(el => { const v = t(el.dataset.i18n); if (v) el.textContent = v; });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => { const v = t(el.dataset.i18nPh); if (v) el.placeholder = v; });
  renderTabs();
  filterPhrases();
  renderCulture();
  const ts = document.getElementById('tts-status');
  if (ts) ts.textContent = ttsReady ? t('tts.ok') : t('tts.no');
  // refresh voice tip text on language switch
  const tip = document.getElementById('vb-tip');
  if (tip && tip.classList.contains('show')) tip.innerHTML = t('voice.tip');
}

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('edu-lang', lang);
  applyLang();
}

// ═══════════════════════════════════════════════════════
//  TTS — multi-voice + speed control
// ═══════════════════════════════════════════════════════
let ttsReady = false;
let jaVoices = [];
let selectedVoice = null;
let playRate = 0.84;
let playPitch = 1.0;

function friendlyName(v) {
  const n = v.name;
  if (/Nanami/i.test(n))  return '南波美 ♀';
  if (/Keita/i.test(n))   return '圭太 ♂';
  if (/Haruka/i.test(n))  return '遥 ♀';
  if (/Kyoko/i.test(n))   return 'Kyoko ♀';
  if (/O-ren/i.test(n))   return 'O-ren ♀';
  if (/Google/i.test(n))  return 'Google ♀';
  if (/Hattori/i.test(n)) return '服部 ♂';
  // strip long suffixes like " - Japanese (Japan)" or " Online (Natural)"
  return n.replace(/Microsoft /i,'').replace(/ Online.*$/i,'').replace(/ - .*/,'').trim();
}

function renderVoiceBar() {
  const bar = document.getElementById('voice-bar');
  const chips = document.getElementById('voice-chips');
  const tip = document.getElementById('vb-tip');
  bar.classList.add('visible');

  if (jaVoices.length === 0) {
    chips.innerHTML = `<span class="voice-chip active">${t('voice.system')}</span>`;
    tip.innerHTML = t('voice.tip'); tip.classList.add('show');
  } else if (jaVoices.length === 1) {
    chips.innerHTML = `<span class="voice-chip active">${friendlyName(jaVoices[0])}</span>`;
    tip.innerHTML = t('voice.tip'); tip.classList.add('show');
  } else {
    chips.innerHTML = jaVoices.map((v, i) =>
      `<button class="voice-chip${v === selectedVoice ? ' active' : ''}" onclick="selectVoice(${i})">${friendlyName(v)}</button>`
    ).join('');
    tip.classList.remove('show');
  }
  // re-apply i18n to labelled buttons
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t(el.dataset.i18n); if (v) el.textContent = v;
  });
}

function selectVoice(idx) {
  selectedVoice = jaVoices[idx];
  renderVoiceBar();
  speakText('こんにちは、よろしくお願いします');
}

function setSpeed(btn) {
  playRate = parseFloat(btn.dataset.rate);
  btn.closest('.speed-btns').querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setPitch(btn) {
  playPitch = parseFloat(btn.dataset.pitch);
  btn.closest('.speed-btns').querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // preview the new pitch immediately
  speakText('こんにちは');
}

function initTTS() {
  const el = document.getElementById('tts-status');
  if (!window.speechSynthesis) {
    el.textContent = t('tts.no'); el.classList.add('unavail'); return;
  }
  const setup = () => {
    const all = speechSynthesis.getVoices();
    jaVoices = all.filter(v => v.lang.startsWith('ja'));
    selectedVoice = jaVoices[0] || null;
    ttsReady = all.length > 0;
    el.textContent = t(ttsReady ? 'tts.ok' : 'tts.no');
    if (!ttsReady) el.classList.add('unavail');
    else renderVoiceBar();
  };
  if (speechSynthesis.getVoices().length > 0) setup();
  else speechSynthesis.onvoiceschanged = setup;
}

function _makeSpeech(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = playRate;
  u.pitch = playPitch;
  if (selectedVoice) u.voice = selectedVoice;
  return u;
}

function speakCard(btn) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = _makeSpeech(btn.dataset.tts);
  btn.classList.add('speaking');
  u.onend = u.onerror = () => btn.classList.remove('speaking');
  speechSynthesis.speak(u);
}

function speakText(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  speechSynthesis.speak(_makeSpeech(text));
}

// ═══════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════
let activeTab = 'all';
let searchQ = '';
let favorites = JSON.parse(localStorage.getItem('jp-favs') || '[]');

// ═══════════════════════════════════════════════════════
//  Tabs
// ═══════════════════════════════════════════════════════
function renderTabs() {
  document.getElementById('tabs').innerHTML = CATS.map(c => {
    const cls = ['tab', c === 'fav' ? 'fav-tab' : '', c === activeTab ? 'active' : ''].filter(Boolean).join(' ');
    return `<button class="${cls}" onclick="setTab('${c}')">${t('cat.' + c)}</button>`;
  }).join('');
}

function setTab(cat) { activeTab = cat; renderTabs(); filterPhrases(); }

// ═══════════════════════════════════════════════════════
//  Phrase cards
// ═══════════════════════════════════════════════════════
function filterPhrases() {
  const grid = document.getElementById('phrase-grid');
  const q = searchQ.toLowerCase();
  let list = PHRASES;

  if (activeTab === 'fav') list = list.filter(p => favorites.includes(p.id));
  else if (activeTab !== 'all') list = list.filter(p => p.cat === activeTab);

  if (q) list = list.filter(p =>
    p.jp.includes(q) || p.romaji.toLowerCase().includes(q) ||
    p.zh.includes(q) || p.en.toLowerCase().includes(q)
  );

  if (!list.length) {
    const msg = (activeTab === 'fav' && !q) ? t('empty.fav') : t('empty.search');
    const icon = activeTab === 'fav' ? '⭐' : '🔍';
    grid.innerHTML = `<div class="empty-state"><div class="ei">${icon}</div><p>${msg}</p></div>`;
    return;
  }
  grid.innerHTML = list.map(renderCard).join('');
}

function renderCard(p) {
  const isFav = favorites.includes(p.id);
  const isSlang = p.lv === 'slang';
  const isEss = p.lv === 'ess';
  const cardCls = ['p-card', isSlang ? 'slang-card' : '', isEss ? 'essential-card' : ''].filter(Boolean).join(' ');

  const badges = [];
  if (isEss) badges.push(`<span class="badge badge-ess">${t('badge.ess')}</span>`);
  if (isSlang) badges.push(`<span class="badge badge-slang">${t('badge.slang')}</span>`);
  if (p.lv === 'casual') badges.push(`<span class="badge badge-casual">${t('badge.casual')}</span>`);

  const tipKey = lang === 'zh' ? 'tip_zh' : 'tip_en';
  const tip = p[tipKey];

  // escape single quotes in tts string for data attribute
  const ttsEsc = (p.tts || p.jp).replace(/"/g, '&quot;');

  return `<div class="${cardCls}">
  ${badges.length ? `<div class="card-badges">${badges.join('')}</div>` : ''}
  <div class="jp-text">${p.jp}</div>
  <div class="romaji">${p.romaji}</div>
  <div class="meanings">
    <div class="meaning-row"><span class="meaning-flag">🇨🇳</span><span class="meaning-text">${p.zh}</span></div>
    <div class="meaning-row"><span class="meaning-flag">🌐</span><span class="meaning-text">${p.en}</span></div>
  </div>
  ${tip ? `<div class="tip-block">${tip}</div>` : ''}
  <div class="card-actions">
    <button class="speak-btn" data-tts="${ttsEsc}" onclick="speakCard(this)">${t('btn.speak')}</button>
    <button class="fav-btn ${isFav ? 'on' : ''}" data-id="${p.id}" onclick="toggleFav(this)">⭐</button>
  </div>
</div>`;
}

function toggleFav(btn) {
  const id = btn.dataset.id;
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
    btn.classList.remove('on');
  } else {
    favorites.push(id);
    btn.classList.add('on');
  }
  localStorage.setItem('jp-favs', JSON.stringify(favorites));
  if (activeTab === 'fav') filterPhrases();
}

// ═══════════════════════════════════════════════════════
//  Culture tips
// ═══════════════════════════════════════════════════════
function renderCulture() {
  const tk = lang === 'zh' ? 'title_zh' : 'title_en';
  const bk = lang === 'zh' ? 'body_zh' : 'body_en';
  document.getElementById('culture-grid').innerHTML = CULTURE.map(c =>
    `<div class="culture-card"><div class="culture-title">${c[tk]}</div><div class="culture-body">${c[bk]}</div></div>`
  ).join('');
}

// ═══════════════════════════════════════════════════════
//  Flashcard drill
// ═══════════════════════════════════════════════════════
let drillQueue = [], drillIdx = 0, drillFlipped = false, drillOk = 0, drillTotal = 0;

function buildDrillPool() {
  let pool = activeTab === 'fav' ? PHRASES.filter(p => favorites.includes(p.id))
           : activeTab === 'all' ? [...PHRASES]
           : PHRASES.filter(p => p.cat === activeTab);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    pool = pool.filter(p => p.jp.includes(q) || p.romaji.toLowerCase().includes(q) || p.zh.includes(q));
  }
  return pool;
}

function startDrill() {
  const pool = buildDrillPool();
  if (!pool.length) { alert(t('drill.empty')); return; }
  drillQueue = pool.sort(() => Math.random() - 0.5);
  drillIdx = 0; drillOk = 0; drillTotal = 0; drillFlipped = false;
  document.getElementById('drill-overlay').classList.add('open');
  showDrillCard();
}

function showDrillCard() {
  const prog = drillQueue.length ? drillIdx / drillQueue.length * 100 : 100;
  document.getElementById('drill-bar').style.width = prog + '%';

  if (drillIdx >= drillQueue.length) {
    document.getElementById('drill-jp').textContent = '🎉';
    document.getElementById('drill-back').style.display = 'none';
    document.getElementById('drill-btns').style.display = 'none';
    document.getElementById('drill-hint').textContent = '';
    document.getElementById('drill-score').textContent =
      t('drill.done').replace('%ok', drillOk).replace('%total', drillTotal);
    return;
  }

  const p = drillQueue[drillIdx];
  document.getElementById('drill-jp').textContent = p.jp;
  document.getElementById('drill-back').style.display = 'none';
  document.getElementById('drill-btns').style.display = 'none';
  document.getElementById('drill-hint').textContent = t('drill.tap');
  document.getElementById('drill-score').textContent =
    t('drill.score').replace('%ok', drillOk).replace('%total', drillTotal);
  drillFlipped = false;
}

function flipDrill() {
  if (drillFlipped || drillIdx >= drillQueue.length) return;
  drillFlipped = true;
  const p = drillQueue[drillIdx];
  document.getElementById('drill-romaji').textContent = p.romaji;
  document.getElementById('drill-meaning').textContent = lang === 'zh' ? p.zh : p.en;
  document.getElementById('drill-back').style.display = 'block';
  document.getElementById('drill-btns').style.display = 'flex';
  document.getElementById('drill-hint').textContent = '';
  speakText(p.tts || p.jp);
}

function drillAnswer(ok) { drillTotal++; if (ok) drillOk++; drillIdx++; showDrillCard(); }
function drillNext() { drillIdx++; showDrillCard(); }
function closeDrill() { document.getElementById('drill-overlay').classList.remove('open'); }

// ═══════════════════════════════════════════════════════
//  Search
// ═══════════════════════════════════════════════════════
document.getElementById('search').addEventListener('input', function () {
  searchQ = this.value.trim();
  filterPhrases();
});

// ═══════════════════════════════════════════════════════
//  Boot
// ═══════════════════════════════════════════════════════
initTTS();
applyLang();
</script>
